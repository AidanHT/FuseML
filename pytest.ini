[pytest]
testpaths = tests
markers =
    surgery: graph surgery tests (_apply_surgery method)
    shape_prop: shape propagation and metadata extraction tests
    codegen: Triton code generation tests
    launcher: KernelLauncher runtime dispatch tests
    compiler: FuseMLCompiler wiring and helper function tests
    control_flow: control flow validation pass tests
    reduction: reduction codegen and cross-thread synchronization tests
    graph_cut: graph-cutting safeguard and FusionGroup splitting tests
    cache: kernel cache key, fingerprinting, and caching engine tests
    get_attr: get_attr resolution, parameter binding, and enhanced DCE tests
    view_penetration: transparent view/metadata op absorption during pattern matching
    mutation_safety: in-place mutation detection and aliasing safety guard tests
    fallback: EagerFallbackGuard deterministic fallback and precision auditing tests
    precision: mixed-precision boundary handling, safe downcasting, and vectorized epilogue tests
    autotune: dynamic @triton.autotune config generation and SRAM budget enforcement tests
    sram_autotuner: AOT SRAM-aware autotuning, config generation, scoring, and caching tests
    aot_topology: AOT-agnostic graph topology, canonical hashing, SymInt safety, and defining-node resolution tests
